name: Build FongMi TV Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 修复 1：创建缺失的 local.properties 文件
      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      # 修复 2：强制写入 compileSdk 解决配置错误
      - name: Fix compileSdk
        run: |
          echo "android.compileSdk = 34" >> app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 编译 Debug 版（不需要签名）
      - name: Build debug
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-apks
          path: app/build/outputs/apk/debug/*.apk
