name: Build FongMi TV Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整项目，保证结构完整

      # 自动创建必需的配置文件（修复 No such file or directory）
      - name: Create required files
        run: |
          touch local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 官方项目正确编译命令
      - name: Build FongMi
        run: ./gradlew assembleLeanbackDebug assembleMobileDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: fongmi-apks
          path: |
            app/build/outputs/apk/leanback/debug/*.apk
            app/build/outputs/apk/mobile/debug/*.apk
